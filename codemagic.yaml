workflows:
  android-workflow:
    name: AttendX Android Build
    max_build_duration: 60
    environment:
      flutter: 3.19.0
      android_signing:
        - keystore_reference
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_KEY: $SUPABASE_KEY
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_KEY=$SUPABASE_KEY
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - expenseshospital@gmail.com
        notify:
          success: true
          failure: true
