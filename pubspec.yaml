name: attendx
description: AttendX Attendance App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  google_mlkit_face_detection: ^0.9.0
  camera: ^0.10.5
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.2
  http: ^1.1.0
  image_picker: ^1.0.7
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
